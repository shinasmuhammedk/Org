root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/server"
bin = "./tmp/main"
full_bin = "./tmp/main"

include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "logs"]
exclude_file = []
exclude_regex = ["_test.go"]

poll = true
poll_interval = 1000

delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true